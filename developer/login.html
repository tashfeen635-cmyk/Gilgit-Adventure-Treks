<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Developer Login</title>
  <link rel="stylesheet" href="css/developer.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h1>Developer Panel</h1>
      <p class="subtitle">Site Configuration Dashboard</p>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="form-control" placeholder="Enter username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="form-control" placeholder="Enter password" required>
            <button type="button" class="password-toggle" onclick="togglePw(this)">&#128065;</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:0.7rem;">
          Sign In
        </button>
      </form>

      <div style="text-align:center; margin-top:1.5rem;">
        <button id="seedBtn" class="btn btn-outline btn-sm" style="font-size:0.75rem;">Seed Developer Account</button>
        <p id="seedMsg" style="font-size:0.75rem; margin-top:0.5rem; color:#64748b; display:none;"></p>
      </div>
    </div>
  </div>

  <script>
    function togglePw(btn) {
      var input = btn.previousElementSibling;
      if (input.type === 'password') { input.type = 'text'; btn.innerHTML = '&#128064;'; }
      else { input.type = 'password'; btn.innerHTML = '&#128065;'; }
    }

    if (localStorage.getItem('dev_token')) {
      window.location.href = '/developer/index.html';
    }

    document.getElementById('seedBtn').addEventListener('click', async function() {
      var msgEl = document.getElementById('seedMsg');
      try {
        var res = await fetch('/api/dev/seed', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
        var data = await res.json();
        msgEl.textContent = res.ok ? 'Account created! Username: developer, Password: dev123456' : data.message;
        msgEl.style.color = res.ok ? '#22c55e' : '#ef4444';
        msgEl.style.display = 'block';
      } catch (err) {
        msgEl.textContent = 'Network error';
        msgEl.style.color = '#ef4444';
        msgEl.style.display = 'block';
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var errorEl = document.getElementById('errorMsg');
      errorEl.style.display = 'none';

      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;

      try {
        var res = await fetch('/api/dev/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: username, password: password })
        });
        var data = await res.json();
        if (!res.ok) {
          errorEl.textContent = data.message || 'Login failed';
          errorEl.style.display = 'block';
          return;
        }
        localStorage.setItem('dev_token', data.token);
        localStorage.setItem('dev_username', data.username);
        window.location.href = '/developer/index.html';
      } catch (err) {
        errorEl.textContent = 'Network error. Is the server running?';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
