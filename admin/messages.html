<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages — Admin Panel</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-topbar">
    <h1>Gilgit Adventure Treks — Admin</h1>
    <div class="topbar-right">
      <span class="admin-user" id="adminUser"></span>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </div>

  <nav class="admin-nav">
    <a href="index.html">Dashboard</a>
    <a href="destinations.html">Destinations</a>
    <a href="bookings.html">Bookings</a>
    <a href="reviews.html">Reviews</a>
    <a href="deals.html">Deals</a>
    <a href="subscribers.html">Subscribers</a>
    <a href="messages.html">Messages</a>
    <a href="videos.html">Videos</a>
    <a href="gallery.html">Gallery</a>
    <a href="team.html">Team</a>
    <a href="settings.html">Settings</a>
  </nav>

  <div class="admin-content">
    <div class="admin-card">
      <div class="admin-card-header">
        <h2>Contact Messages</h2>
        <div style="display:flex;gap:8px;align-items:center;">
          <select id="statusFilter" class="form-control" style="width:auto;">
            <option value="all">All</option>
            <option value="unread">Unread</option>
            <option value="read">Read</option>
            <option value="replied">Replied</option>
          </select>
        </div>
      </div>
      <div class="admin-card-body admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Email</th>
              <th>Subject</th>
              <th>Status</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="msgBody">
            <tr><td colspan="7" style="text-align:center;color:#94a3b8;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
      <div id="msgPagination"></div>
    </div>
  </div>

  <!-- View Message Modal -->
  <div class="admin-modal-overlay" id="viewModal">
    <div class="admin-modal" style="max-width:600px;">
      <div class="admin-modal-header">
        <h3 id="modalSubject"></h3>
        <button class="admin-modal-close" onclick="closeModal('viewModal')">&times;</button>
      </div>
      <div class="admin-modal-body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
          <div><strong>Name:</strong> <span id="modalName"></span></div>
          <div><strong>Email:</strong> <span id="modalEmail"></span></div>
          <div><strong>Phone:</strong> <span id="modalPhone"></span></div>
          <div><strong>Date:</strong> <span id="modalDate"></span></div>
        </div>
        <div style="margin-bottom:16px;">
          <strong>Status:</strong>
          <select id="modalStatus" class="form-control" style="width:auto;display:inline-block;margin-left:8px;">
            <option value="unread">Unread</option>
            <option value="read">Read</option>
            <option value="replied">Replied</option>
          </select>
        </div>
        <div>
          <strong>Message:</strong>
          <div id="modalMessage" style="margin-top:8px;padding:12px;background:#f1f5f9;border-radius:8px;white-space:pre-wrap;"></div>
        </div>
      </div>
      <div class="admin-modal-footer">
        <button class="btn btn-primary" onclick="updateStatus()">Save Status</button>
        <button class="btn btn-outline" onclick="closeModal('viewModal')">Close</button>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script src="js/messages.js"></script>
</body>
</html>
