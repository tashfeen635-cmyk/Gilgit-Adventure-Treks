<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Branding — Developer Panel</title>
  <link rel="stylesheet" href="css/developer.css">
</head>
<body>
  <div class="dev-topbar">
    <h1>Developer Panel</h1>
    <div class="topbar-right">
      <span class="dev-user" id="devUser"></span>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </div>

  <nav class="dev-nav">
    <a href="index.html">Dashboard</a>
    <a href="branding.html">Branding</a>
    <a href="hero.html">Hero</a>
    <a href="sections.html">Sections</a>
    <a href="navigation.html">Navigation</a>
    <a href="footer.html">Footer</a>
    <a href="newsletter.html">Newsletter</a>
    <a href="booking.html">Booking</a>
    <a href="contact.html">Contact</a>
    <a href="ai-planner.html">AI Planner</a>
    <a href="admins.html">Admins</a>
    <a href="loading.html">Loading</a>
    <a href="settings.html">Settings</a>
  </nav>

  <div class="dev-content">
    <div class="dev-card">
      <div class="dev-card-header"><h2>Branding Settings</h2></div>
      <div class="dev-card-body">
        <div class="settings-msg" id="msg"></div>
        <form id="brandingForm">
          <div class="form-group">
            <label for="logoUrl">Logo URL</label>
            <input type="text" id="logoUrl" class="form-control" placeholder="images/logo.png">
            <p class="form-hint">Relative path from site root (e.g. images/logo.png)</p>
          </div>
          <div class="form-group">
            <label for="companyName">Company Name (Full)</label>
            <input type="text" id="companyName" class="form-control" placeholder="Gilgit Adventure Treks">
          </div>
          <div class="form-group">
            <label for="companyShortName">Company Short Name</label>
            <input type="text" id="companyShortName" class="form-control" placeholder="The Journey Team">
            <p class="form-hint">Used in footer and some headings</p>
          </div>
          <div class="form-group">
            <label for="faviconUrl">Favicon URL</label>
            <input type="text" id="faviconUrl" class="form-control" placeholder="images/logo.png">
          </div>
          <button type="submit" class="btn btn-primary">Save Branding</button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/developer.js"></script>
  <script>
    initDevLayout();

    (async () => {
      var s = await loadSettings();
      var b = s.branding || {};
      document.getElementById('logoUrl').value = b.logoUrl || '';
      document.getElementById('companyName').value = b.companyName || '';
      document.getElementById('companyShortName').value = b.companyShortName || '';
      document.getElementById('faviconUrl').value = b.faviconUrl || '';
    })();

    document.getElementById('brandingForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var msgEl = document.getElementById('msg');
      try {
        await saveSettings({
          branding: {
            logoUrl: document.getElementById('logoUrl').value.trim(),
            companyName: document.getElementById('companyName').value.trim(),
            companyShortName: document.getElementById('companyShortName').value.trim(),
            faviconUrl: document.getElementById('faviconUrl').value.trim()
          }
        });
        showMsg(msgEl, 'Branding saved successfully!', false);
      } catch (err) {
        showMsg(msgEl, err.message, true);
      }
    });
  </script>
</body>
</html>
