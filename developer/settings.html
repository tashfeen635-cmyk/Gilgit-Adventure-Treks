<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — Developer Panel</title>
  <link rel="stylesheet" href="css/developer.css">
</head>
<body>
  <div class="dev-topbar">
    <h1>Developer Panel</h1>
    <div class="topbar-right">
      <span class="dev-user" id="devUser"></span>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </div>

  <nav class="dev-nav">
    <a href="index.html">Dashboard</a>
    <a href="branding.html">Branding</a>
    <a href="hero.html">Hero</a>
    <a href="sections.html">Sections</a>
    <a href="navigation.html">Navigation</a>
    <a href="footer.html">Footer</a>
    <a href="newsletter.html">Newsletter</a>
    <a href="booking.html">Booking</a>
    <a href="contact.html">Contact</a>
    <a href="ai-planner.html">AI Planner</a>
    <a href="admins.html">Admins</a>
    <a href="loading.html">Loading</a>
    <a href="seo.html">SEO</a>
    <a href="settings.html">Settings</a>
  </nav>

  <div class="dev-content">
    <!-- Change Username -->
    <div class="dev-card">
      <div class="dev-card-header"><h2>Change Username</h2></div>
      <div class="dev-card-body">
        <div class="settings-msg" id="usernameMsg"></div>
        <form id="usernameForm">
          <div class="form-group">
            <label for="newUsername">New Username</label>
            <input type="text" id="newUsername" class="form-control" placeholder="Enter new username" required minlength="3">
          </div>
          <div class="form-group">
            <label for="usernameCurrentPass">Current Password</label>
            <div class="password-wrapper">
              <input type="password" id="usernameCurrentPass" class="form-control" placeholder="Enter current password to confirm" required>
              <button type="button" class="password-toggle" onclick="togglePassword(this)">&#128065;</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary">Update Username</button>
        </form>
      </div>
    </div>

    <!-- Change Password -->
    <div class="dev-card">
      <div class="dev-card-header"><h2>Change Password</h2></div>
      <div class="dev-card-body">
        <div class="settings-msg" id="passwordMsg"></div>
        <form id="passwordForm">
          <div class="form-group">
            <label for="passwordCurrentPass">Current Password</label>
            <div class="password-wrapper">
              <input type="password" id="passwordCurrentPass" class="form-control" placeholder="Enter current password" required>
              <button type="button" class="password-toggle" onclick="togglePassword(this)">&#128065;</button>
            </div>
          </div>
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <div class="password-wrapper">
              <input type="password" id="newPassword" class="form-control" placeholder="Enter new password (min 6 characters)" required minlength="6">
              <button type="button" class="password-toggle" onclick="togglePassword(this)">&#128065;</button>
            </div>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm New Password</label>
            <div class="password-wrapper">
              <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm new password" required minlength="6">
              <button type="button" class="password-toggle" onclick="togglePassword(this)">&#128065;</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary">Update Password</button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/developer.js"></script>
  <script>
    initDevLayout();

    // Pre-fill current username
    document.getElementById('newUsername').value = localStorage.getItem('dev_username') || '';

    // Change Username
    document.getElementById('usernameForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var msgEl = document.getElementById('usernameMsg');
      var newUsername = document.getElementById('newUsername').value.trim();
      var currentPassword = document.getElementById('usernameCurrentPass').value;

      try {
        var data = await apiCall('/dev/profile', {
          method: 'PUT',
          body: JSON.stringify({ newUsername: newUsername, currentPassword: currentPassword })
        });
        localStorage.setItem('dev_token', data.token);
        localStorage.setItem('dev_username', data.username);
        document.getElementById('devUser').textContent = data.username;
        document.getElementById('usernameCurrentPass').value = '';
        showMsg(msgEl, 'Username updated successfully!', false);
      } catch (err) {
        showMsg(msgEl, err.message, true);
      }
    });

    // Change Password
    document.getElementById('passwordForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var msgEl = document.getElementById('passwordMsg');
      var currentPassword = document.getElementById('passwordCurrentPass').value;
      var newPassword = document.getElementById('newPassword').value;
      var confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword !== confirmPassword) {
        showMsg(msgEl, 'New passwords do not match', true);
        return;
      }

      try {
        var data = await apiCall('/dev/profile', {
          method: 'PUT',
          body: JSON.stringify({ newPassword: newPassword, currentPassword: currentPassword })
        });
        localStorage.setItem('dev_token', data.token);
        document.getElementById('passwordCurrentPass').value = '';
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
        showMsg(msgEl, 'Password updated successfully!', false);
      } catch (err) {
        showMsg(msgEl, err.message, true);
      }
    });
  </script>
</body>
</html>
