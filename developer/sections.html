<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Section Headers — Developer Panel</title>
  <link rel="stylesheet" href="css/developer.css">
</head>
<body>
  <div class="dev-topbar">
    <h1>Developer Panel</h1>
    <div class="topbar-right">
      <span class="dev-user" id="devUser"></span>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </div>

  <nav class="dev-nav">
    <a href="index.html">Dashboard</a>
    <a href="branding.html">Branding</a>
    <a href="hero.html">Hero</a>
    <a href="sections.html">Sections</a>
    <a href="navigation.html">Navigation</a>
    <a href="footer.html">Footer</a>
    <a href="newsletter.html">Newsletter</a>
    <a href="booking.html">Booking</a>
    <a href="contact.html">Contact</a>
    <a href="ai-planner.html">AI Planner</a>
    <a href="admins.html">Admins</a>
    <a href="loading.html">Loading</a>
    <a href="settings.html">Settings</a>
  </nav>

  <div class="dev-content">
    <div class="settings-msg" id="msg"></div>
    <form id="sectionsForm">
      <div id="sectionsContainer"></div>
      <button type="submit" class="btn btn-primary" style="margin-top:0.5rem;">Save All Section Headers</button>
    </form>
  </div>

  <script src="js/developer.js"></script>
  <script>
    initDevLayout();

    var sectionKeys = [
      { key: 'gallery', label: 'Gallery' },
      { key: 'videos', label: 'Videos' },
      { key: 'team', label: 'Team' },
      { key: 'topDestinations', label: 'Top Destinations' },
      { key: 'destinations', label: 'Destinations' },
      { key: 'map', label: 'Map' },
      { key: 'tripPlanner', label: 'Trip Planner' },
      { key: 'booking', label: 'Booking' },
      { key: 'reviews', label: 'Reviews' },
      { key: 'deals', label: 'Deals' }
    ];

    function buildSectionCards(headers) {
      var c = document.getElementById('sectionsContainer');
      c.innerHTML = '';
      sectionKeys.forEach(function(s) {
        var h = (headers && headers[s.key]) || {};
        var card = document.createElement('div');
        card.className = 'dev-card';
        card.innerHTML =
          '<div class="dev-card-header"><h2>' + escapeHtml(s.label) + ' Section</h2></div>' +
          '<div class="dev-card-body">' +
            '<div class="form-group"><label>Tag</label><input type="text" class="form-control sect-tag" data-key="' + s.key + '" value="' + escapeHtml(h.tag || '') + '"></div>' +
            '<div class="form-group"><label>Title</label><input type="text" class="form-control sect-title" data-key="' + s.key + '" value="' + escapeHtml(h.title || '') + '"></div>' +
            '<div class="form-group"><label>Description</label><textarea class="form-control sect-desc" data-key="' + s.key + '" rows="2">' + escapeHtml(h.description || '') + '</textarea></div>' +
          '</div>';
        c.appendChild(card);
      });
    }

    (async () => {
      var s = await loadSettings();
      buildSectionCards(s.sectionHeaders);
    })();

    document.getElementById('sectionsForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var msgEl = document.getElementById('msg');
      var data = {};
      sectionKeys.forEach(function(s) {
        var tag = document.querySelector('.sect-tag[data-key="' + s.key + '"]').value.trim();
        var title = document.querySelector('.sect-title[data-key="' + s.key + '"]').value.trim();
        var desc = document.querySelector('.sect-desc[data-key="' + s.key + '"]').value.trim();
        data[s.key] = { tag: tag, title: title, description: desc };
      });
      try {
        await saveSettings({ sectionHeaders: data });
        showMsg(msgEl, 'All section headers saved!', false);
      } catch (err) {
        showMsg(msgEl, err.message, true);
      }
    });
  </script>
</body>
</html>
