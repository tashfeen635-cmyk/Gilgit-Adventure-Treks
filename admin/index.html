<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Admin Panel</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-topbar">
    <h1>Gilgit Adventure Treks — Admin</h1>
    <div class="topbar-right">
      <span class="admin-user" id="adminUser"></span>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </div>

  <nav class="admin-nav">
    <a href="index.html">Dashboard</a>
    <a href="destinations.html">Services</a>
    <a href="bookings.html">Bookings</a>
    <a href="reviews.html">Reviews</a>
    <a href="deals.html">Deals</a>
    <a href="subscribers.html">Subscribers</a>
    <a href="messages.html">Messages</a>
    <a href="videos.html">Videos</a>
    <a href="gallery.html">Gallery</a>
    <a href="team.html">Team</a>
    <a href="users.html">Users</a>
    <a href="login-logs.html">Login Logs</a>
    <a href="settings.html">Settings</a>
  </nav>

  <div class="admin-content">
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-label">Services</div><div class="stat-value" id="statDest">—</div></div>
      <div class="stat-card"><div class="stat-label">Bookings</div><div class="stat-value" id="statBook">—</div></div>
      <div class="stat-card"><div class="stat-label">Reviews</div><div class="stat-value" id="statReview">—</div></div>
      <div class="stat-card"><div class="stat-label">Deals</div><div class="stat-value" id="statDeal">—</div></div>
      <div class="stat-card"><div class="stat-label">Subscribers</div><div class="stat-value" id="statSub">—</div></div>
      <div class="stat-card"><div class="stat-label">Messages</div><div class="stat-value" id="statMsg">—</div></div>
      <div class="stat-card"><div class="stat-label">Videos</div><div class="stat-value" id="statVideo">—</div></div>
      <div class="stat-card"><div class="stat-label">Gallery</div><div class="stat-value" id="statGallery">—</div></div>
      <div class="stat-card"><div class="stat-label">Team</div><div class="stat-value" id="statTeam">—</div></div>
    </div>

    <div class="admin-card">
      <div class="admin-card-header"><h2>Recent Bookings</h2></div>
      <div class="admin-card-body admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Reference</th>
              <th>Destination</th>
              <th>Status</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="recentBookings">
            <tr><td colspan="4" style="text-align:center;color:#94a3b8;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    initAdminLayout();

    (async () => {
      try {
        // Load stats with better error handling
        const loadStat = async (endpoint, elementId) => {
          try {
            const data = await apiCall(endpoint);
            document.getElementById(elementId).textContent = data.length || 0;
            return data;
          } catch (err) {
            console.error(`Failed to load ${endpoint}:`, err.message);
            document.getElementById(elementId).textContent = '—';
            return [];
          }
        };

        const [destinations, bookings, reviews, deals, subscribers, messages, videos, gallery, team] = await Promise.all([
          loadStat('/destinations', 'statDest'),
          loadStat('/bookings', 'statBook'),
          loadStat('/reviews/all', 'statReview'), // FIX: Use /reviews/all for admin
          loadStat('/deals', 'statDeal'),
          loadStat('/subscribers', 'statSub'),
          loadStat('/contact', 'statMsg'),
          loadStat('/videos', 'statVideo'),
          loadStat('/gallery', 'statGallery'),
          loadStat('/team', 'statTeam')
        ]);

        // Recent bookings
        const tbody = document.getElementById('recentBookings');
        if (!bookings || bookings.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#94a3b8;">No bookings yet</td></tr>';
        } else {
          tbody.innerHTML = bookings.slice(0, 5).map(b => `
            <tr>
              <td><strong>${escapeHtml(b.reference)}</strong></td>
              <td>${escapeHtml(b.destination)}</td>
              <td><span class="badge badge-${b.status}">${b.status}</span></td>
              <td>${formatDate(b.createdAt)}</td>
            </tr>
          `).join('');
        }
      } catch (err) {
        console.error('Dashboard load error:', err);
        alert('Failed to load dashboard. Please check console for details.');
      }
    })();
  </script>
</body>
</html>
