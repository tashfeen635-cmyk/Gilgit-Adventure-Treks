<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Footer — Developer Panel</title>
  <link rel="stylesheet" href="css/developer.css">
</head>
<body>
  <div class="dev-topbar">
    <h1>Developer Panel</h1>
    <div class="topbar-right">
      <span class="dev-user" id="devUser"></span>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </div>

  <nav class="dev-nav">
    <a href="index.html">Dashboard</a>
    <a href="branding.html">Branding</a>
    <a href="hero.html">Hero</a>
    <a href="sections.html">Sections</a>
    <a href="navigation.html">Navigation</a>
    <a href="footer.html">Footer</a>
    <a href="newsletter.html">Newsletter</a>
    <a href="booking.html">Booking</a>
    <a href="contact.html">Contact</a>
    <a href="ai-planner.html">AI Planner</a>
    <a href="admins.html">Admins</a>
    <a href="loading.html">Loading</a>
    <a href="settings.html">Settings</a>
  </nav>

  <div class="dev-content">
    <div class="dev-card">
      <div class="dev-card-header"><h2>Footer Content</h2></div>
      <div class="dev-card-body">
        <div class="settings-msg" id="msgFooter"></div>
        <form id="footerForm">
          <div class="form-group">
            <label for="footerDesc">Footer Description</label>
            <textarea id="footerDesc" class="form-control" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label for="copyrightText">Copyright Text</label>
            <input type="text" id="copyrightText" class="form-control">
          </div>
          <button type="submit" class="btn btn-primary">Save Footer Text</button>
        </form>
      </div>
    </div>

    <div class="dev-card">
      <div class="dev-card-header">
        <h2>Social Links</h2>
        <button class="btn btn-primary btn-sm" id="addSocial">+ Add Link</button>
      </div>
      <div class="dev-card-body">
        <div class="settings-msg" id="msgSocial"></div>
        <div id="socialContainer"></div>
        <button type="button" class="btn btn-primary" id="saveSocial" style="margin-top:0.75rem;">Save Social Links</button>
      </div>
    </div>

    <div class="dev-card">
      <div class="dev-card-header">
        <h2>Trust Badges</h2>
        <button class="btn btn-primary btn-sm" id="addBadge">+ Add Badge</button>
      </div>
      <div class="dev-card-body">
        <div class="settings-msg" id="msgBadges"></div>
        <div id="badgesContainer"></div>
        <button type="button" class="btn btn-primary" id="saveBadges" style="margin-top:0.75rem;">Save Badges</button>
      </div>
    </div>

    <div class="dev-card">
      <div class="dev-card-header">
        <h2>Footer Link Columns</h2>
        <button class="btn btn-primary btn-sm" id="addColumn">+ Add Column</button>
      </div>
      <div class="dev-card-body">
        <div class="settings-msg" id="msgColumns"></div>
        <div id="columnsContainer"></div>
        <button type="button" class="btn btn-primary" id="saveColumns" style="margin-top:0.75rem;">Save Link Columns</button>
      </div>
    </div>
  </div>

  <script src="js/developer.js"></script>
  <script>
    initDevLayout();

    var socialLinks = [];
    var trustBadges = [];
    var linkColumns = [];

    function renderSocial() {
      var c = document.getElementById('socialContainer');
      c.innerHTML = '';
      socialLinks.forEach(function(s, i) {
        var div = document.createElement('div');
        div.className = 'repeater-item';
        div.innerHTML =
          '<button type="button" class="remove-btn" data-type="social" data-i="' + i + '">&times;</button>' +
          '<div class="form-row">' +
            '<div class="form-group"><label>Platform</label><input type="text" class="form-control social-platform" value="' + escapeHtml(s.platform || '') + '" placeholder="facebook, instagram, etc."></div>' +
            '<div class="form-group"><label>URL</label><input type="text" class="form-control social-url" value="' + escapeHtml(s.url || '') + '"></div>' +
          '</div>';
        c.appendChild(div);
      });
      addRemoveListeners(c, socialLinks, renderSocial);
    }

    function renderBadges() {
      var c = document.getElementById('badgesContainer');
      c.innerHTML = '';
      trustBadges.forEach(function(b, i) {
        var div = document.createElement('div');
        div.className = 'repeater-item';
        div.innerHTML =
          '<button type="button" class="remove-btn" data-i="' + i + '">&times;</button>' +
          '<div class="form-group"><label>Badge Text</label><input type="text" class="form-control badge-text" value="' + escapeHtml(b.text || '') + '"></div>';
        c.appendChild(div);
      });
      addRemoveListeners(c, trustBadges, renderBadges);
    }

    function renderColumns() {
      var c = document.getElementById('columnsContainer');
      c.innerHTML = '';
      linkColumns.forEach(function(col, i) {
        var linksHtml = '';
        (col.links || []).forEach(function(link, j) {
          linksHtml +=
            '<div class="form-row" style="margin-bottom:0.5rem;">' +
              '<input type="text" class="form-control col-link-label" data-col="' + i + '" value="' + escapeHtml(link.label || '') + '" placeholder="Label">' +
              '<input type="text" class="form-control col-link-href" data-col="' + i + '" value="' + escapeHtml(link.href || '') + '" placeholder="href">' +
            '</div>';
        });
        var div = document.createElement('div');
        div.className = 'repeater-item';
        div.innerHTML =
          '<button type="button" class="remove-btn" data-i="' + i + '">&times;</button>' +
          '<div class="form-group"><label>Column Heading</label><input type="text" class="form-control col-heading" value="' + escapeHtml(col.heading || '') + '"></div>' +
          '<label style="font-size:0.8rem;font-weight:500;margin-bottom:0.35rem;display:block;">Links</label>' +
          '<div class="col-links-wrap" data-col="' + i + '">' + linksHtml + '</div>' +
          '<button type="button" class="btn btn-outline btn-sm add-col-link" data-col="' + i + '" style="margin-top:0.25rem;">+ Add Link</button>';
        c.appendChild(div);
      });
      addRemoveListeners(c, linkColumns, renderColumns);
      c.querySelectorAll('.add-col-link').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var ci = parseInt(this.dataset.col);
          if (!linkColumns[ci].links) linkColumns[ci].links = [];
          linkColumns[ci].links.push({ label: '', href: '' });
          renderColumns();
        });
      });
    }

    function addRemoveListeners(container, arr, renderFn) {
      container.querySelectorAll('.remove-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          arr.splice(parseInt(this.dataset.i), 1);
          renderFn();
        });
      });
    }

    (async () => {
      var s = await loadSettings();
      var f = s.footer || {};
      document.getElementById('footerDesc').value = f.description || '';
      document.getElementById('copyrightText').value = f.copyrightText || '';
      socialLinks = f.socialLinks || [];
      trustBadges = f.trustBadges || [];
      linkColumns = f.linkColumns || [];
      renderSocial();
      renderBadges();
      renderColumns();
    })();

    document.getElementById('addSocial').addEventListener('click', function() { socialLinks.push({ platform: '', url: '' }); renderSocial(); });
    document.getElementById('addBadge').addEventListener('click', function() { trustBadges.push({ text: '' }); renderBadges(); });
    document.getElementById('addColumn').addEventListener('click', function() { linkColumns.push({ heading: '', links: [] }); renderColumns(); });

    document.getElementById('footerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var msgEl = document.getElementById('msgFooter');
      try {
        await saveSettings({
          'footer.description': document.getElementById('footerDesc').value.trim(),
          'footer.copyrightText': document.getElementById('copyrightText').value.trim()
        });
        showMsg(msgEl, 'Footer text saved!', false);
      } catch (err) { showMsg(msgEl, err.message, true); }
    });

    document.getElementById('saveSocial').addEventListener('click', async function() {
      var msgEl = document.getElementById('msgSocial');
      var platforms = document.querySelectorAll('.social-platform');
      var urls = document.querySelectorAll('.social-url');
      var data = [];
      platforms.forEach(function(el, i) { data.push({ platform: el.value.trim(), url: urls[i].value.trim() }); });
      try {
        await saveSettings({ 'footer.socialLinks': data });
        socialLinks = data;
        showMsg(msgEl, 'Social links saved!', false);
      } catch (err) { showMsg(msgEl, err.message, true); }
    });

    document.getElementById('saveBadges').addEventListener('click', async function() {
      var msgEl = document.getElementById('msgBadges');
      var texts = document.querySelectorAll('.badge-text');
      var data = [];
      texts.forEach(function(el) { data.push({ text: el.value.trim() }); });
      try {
        await saveSettings({ 'footer.trustBadges': data });
        trustBadges = data;
        showMsg(msgEl, 'Badges saved!', false);
      } catch (err) { showMsg(msgEl, err.message, true); }
    });

    document.getElementById('saveColumns').addEventListener('click', async function() {
      var msgEl = document.getElementById('msgColumns');
      var headings = document.querySelectorAll('.col-heading');
      var data = [];
      headings.forEach(function(el, i) {
        var labels = document.querySelectorAll('.col-link-label[data-col="' + i + '"]');
        var hrefs = document.querySelectorAll('.col-link-href[data-col="' + i + '"]');
        var links = [];
        labels.forEach(function(lbl, j) { links.push({ label: lbl.value.trim(), href: hrefs[j].value.trim() }); });
        data.push({ heading: el.value.trim(), links: links });
      });
      try {
        await saveSettings({ 'footer.linkColumns': data });
        linkColumns = data;
        showMsg(msgEl, 'Link columns saved!', false);
      } catch (err) { showMsg(msgEl, err.message, true); }
    });
  </script>
</body>
</html>
