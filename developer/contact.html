<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Developer Panel</title>
  <link rel="stylesheet" href="css/developer.css">
</head>
<body>
  <div class="dev-topbar">
    <h1>Developer Panel</h1>
    <div class="topbar-right">
      <span class="dev-user" id="devUser"></span>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </div>

  <nav class="dev-nav">
    <a href="index.html">Dashboard</a>
    <a href="branding.html">Branding</a>
    <a href="hero.html">Hero</a>
    <a href="sections.html">Sections</a>
    <a href="navigation.html">Navigation</a>
    <a href="footer.html">Footer</a>
    <a href="newsletter.html">Newsletter</a>
    <a href="booking.html">Booking</a>
    <a href="contact.html">Contact</a>
    <a href="ai-planner.html">AI Planner</a>
    <a href="admins.html">Admins</a>
    <a href="loading.html">Loading</a>
    <a href="settings.html">Settings</a>
  </nav>

  <div class="dev-content">
    <div class="dev-card">
      <div class="dev-card-header"><h2>Contact Information</h2></div>
      <div class="dev-card-body">
        <div class="settings-msg" id="msg"></div>
        <form id="contactForm">
          <div class="form-row">
            <div class="form-group">
              <label for="phone">Phone Number</label>
              <input type="text" id="phone" class="form-control" placeholder="+92 xxx xxxxxxx">
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" class="form-control" placeholder="info@example.com">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="whatsappNumber">WhatsApp Number</label>
              <input type="text" id="whatsappNumber" class="form-control" placeholder="+92xxxxxxxxxx">
            </div>
            <div class="form-group">
              <label for="whatsappUrl">WhatsApp URL</label>
              <input type="text" id="whatsappUrl" class="form-control" placeholder="https://wa.me/92xxxxxxxxxx">
            </div>
          </div>
          <div class="form-group">
            <label for="address">Address</label>
            <textarea id="address" class="form-control" rows="2"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Save Contact Info</button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/developer.js"></script>
  <script>
    initDevLayout();

    (async () => {
      var s = await loadSettings();
      var c = s.contact || {};
      document.getElementById('phone').value = c.phone || '';
      document.getElementById('email').value = c.email || '';
      document.getElementById('whatsappNumber').value = c.whatsappNumber || '';
      document.getElementById('whatsappUrl').value = c.whatsappUrl || '';
      document.getElementById('address').value = c.address || '';
    })();

    document.getElementById('contactForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var msgEl = document.getElementById('msg');
      try {
        await saveSettings({
          contact: {
            phone: document.getElementById('phone').value.trim(),
            email: document.getElementById('email').value.trim(),
            whatsappNumber: document.getElementById('whatsappNumber').value.trim(),
            whatsappUrl: document.getElementById('whatsappUrl').value.trim(),
            address: document.getElementById('address').value.trim()
          }
        });
        showMsg(msgEl, 'Contact info saved!', false);
      } catch (err) {
        showMsg(msgEl, err.message, true);
      }
    });
  </script>
</body>
</html>
