<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero — Developer Panel</title>
  <link rel="stylesheet" href="css/developer.css">
</head>
<body>
  <div class="dev-topbar">
    <h1>Developer Panel</h1>
    <div class="topbar-right">
      <span class="dev-user" id="devUser"></span>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </div>

  <nav class="dev-nav">
    <a href="index.html">Dashboard</a>
    <a href="branding.html">Branding</a>
    <a href="hero.html">Hero</a>
    <a href="sections.html">Sections</a>
    <a href="navigation.html">Navigation</a>
    <a href="footer.html">Footer</a>
    <a href="newsletter.html">Newsletter</a>
    <a href="booking.html">Booking</a>
    <a href="contact.html">Contact</a>
    <a href="ai-planner.html">AI Planner</a>
    <a href="admins.html">Admins</a>
    <a href="loading.html">Loading</a>
    <a href="settings.html">Settings</a>
  </nav>

  <div class="dev-content">
    <div class="dev-card">
      <div class="dev-card-header"><h2>Hero Text</h2></div>
      <div class="dev-card-body">
        <div class="settings-msg" id="msgText"></div>
        <form id="heroTextForm">
          <div class="form-group">
            <label for="heroSubtitle">Subtitle</label>
            <input type="text" id="heroSubtitle" class="form-control">
          </div>
          <div class="form-group">
            <label for="heroTitle">Title (supports &lt;br&gt; for line breaks)</label>
            <input type="text" id="heroTitle" class="form-control">
          </div>
          <div class="form-group">
            <label for="heroDescription">Description</label>
            <textarea id="heroDescription" class="form-control" rows="3"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Save Hero Text</button>
        </form>
      </div>
    </div>

    <div class="dev-card">
      <div class="dev-card-header">
        <h2>Hero Slides</h2>
        <button class="btn btn-primary btn-sm" id="addSlide">+ Add Slide</button>
      </div>
      <div class="dev-card-body">
        <div class="settings-msg" id="msgSlides"></div>
        <div id="slidesContainer"></div>
        <button type="button" class="btn btn-primary" id="saveSlides" style="margin-top:0.75rem;">Save Slides</button>
      </div>
    </div>
  </div>

  <script src="js/developer.js"></script>
  <script>
    initDevLayout();

    var slides = [];

    function renderSlides() {
      var c = document.getElementById('slidesContainer');
      c.innerHTML = '';
      slides.forEach(function(slide, i) {
        var div = document.createElement('div');
        div.className = 'repeater-item';
        div.innerHTML =
          '<button type="button" class="remove-btn" data-i="' + i + '">&times;</button>' +
          '<div class="form-row">' +
            '<div class="form-group"><label>Image URL</label><input type="text" class="form-control slide-url" value="' + escapeHtml(slide.imageUrl || '') + '"></div>' +
            '<div class="form-group"><label>Alt Text</label><input type="text" class="form-control slide-alt" value="' + escapeHtml(slide.alt || '') + '"></div>' +
          '</div>';
        c.appendChild(div);
      });
      c.querySelectorAll('.remove-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          slides.splice(parseInt(this.dataset.i), 1);
          renderSlides();
        });
      });
    }

    (async () => {
      var s = await loadSettings();
      var h = s.hero || {};
      document.getElementById('heroSubtitle').value = h.subtitle || '';
      document.getElementById('heroTitle').value = h.title || '';
      document.getElementById('heroDescription').value = h.description || '';
      slides = h.slides || [];
      renderSlides();
    })();

    document.getElementById('addSlide').addEventListener('click', function() {
      slides.push({ imageUrl: '', alt: '' });
      renderSlides();
    });

    document.getElementById('heroTextForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var msgEl = document.getElementById('msgText');
      try {
        await saveSettings({
          hero: {
            subtitle: document.getElementById('heroSubtitle').value.trim(),
            title: document.getElementById('heroTitle').value.trim(),
            description: document.getElementById('heroDescription').value.trim()
          }
        });
        showMsg(msgEl, 'Hero text saved!', false);
      } catch (err) {
        showMsg(msgEl, err.message, true);
      }
    });

    document.getElementById('saveSlides').addEventListener('click', async function() {
      var msgEl = document.getElementById('msgSlides');
      var urls = document.querySelectorAll('.slide-url');
      var alts = document.querySelectorAll('.slide-alt');
      var data = [];
      urls.forEach(function(el, i) {
        data.push({ imageUrl: el.value.trim(), alt: alts[i].value.trim() });
      });
      try {
        await saveSettings({ 'hero.slides': data });
        slides = data;
        showMsg(msgEl, 'Slides saved!', false);
      } catch (err) {
        showMsg(msgEl, err.message, true);
      }
    });
  </script>
</body>
</html>
