<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Config — Developer Panel</title>
  <link rel="stylesheet" href="css/developer.css">
</head>
<body>
  <div class="dev-topbar">
    <h1>Developer Panel</h1>
    <div class="topbar-right">
      <span class="dev-user" id="devUser"></span>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </div>

  <nav class="dev-nav">
    <a href="index.html">Dashboard</a>
    <a href="branding.html">Branding</a>
    <a href="hero.html">Hero</a>
    <a href="sections.html">Sections</a>
    <a href="navigation.html">Navigation</a>
    <a href="footer.html">Footer</a>
    <a href="newsletter.html">Newsletter</a>
    <a href="booking.html">Booking</a>
    <a href="contact.html">Contact</a>
    <a href="ai-planner.html">AI Planner</a>
    <a href="admins.html">Admins</a>
    <a href="loading.html">Loading</a>
    <a href="seo.html">SEO</a>
    <a href="settings.html">Settings</a>
  </nav>

  <div class="dev-content">
    <div class="dev-card">
      <div class="dev-card-header"><h2>Booking Fee Configuration</h2></div>
      <div class="dev-card-body">
        <div class="settings-msg" id="msg"></div>
        <form id="bookingForm">
          <div class="form-row">
            <div class="form-group">
              <label for="serviceFee">Service Fee (PKR)</label>
              <input type="number" id="serviceFee" class="form-control" min="0">
              <p class="form-hint">Fixed fee added to every booking</p>
            </div>
            <div class="form-group">
              <label for="porterFeePerNight">Porter Fee Per Night (PKR)</label>
              <input type="number" id="porterFeePerNight" class="form-control" min="0">
              <p class="form-hint">Per porter, per night</p>
            </div>
          </div>
          <div class="form-group">
            <label for="childDiscount">Child Discount Multiplier</label>
            <input type="number" id="childDiscount" class="form-control" step="0.1" min="0" max="1">
            <p class="form-hint">0.5 = children pay 50% of adult price</p>
          </div>
          <button type="submit" class="btn btn-primary">Save Booking Config</button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/developer.js"></script>
  <script>
    initDevLayout();

    (async () => {
      var s = await loadSettings();
      var b = s.bookingConfig || {};
      document.getElementById('serviceFee').value = b.serviceFee || 2000;
      document.getElementById('porterFeePerNight').value = b.porterFeePerNight || 3000;
      document.getElementById('childDiscount').value = b.childDiscount || 0.5;
    })();

    document.getElementById('bookingForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var msgEl = document.getElementById('msg');
      try {
        await saveSettings({
          bookingConfig: {
            serviceFee: parseFloat(document.getElementById('serviceFee').value) || 0,
            porterFeePerNight: parseFloat(document.getElementById('porterFeePerNight').value) || 0,
            childDiscount: parseFloat(document.getElementById('childDiscount').value) || 0.5
          }
        });
        showMsg(msgEl, 'Booking config saved!', false);
      } catch (err) {
        showMsg(msgEl, err.message, true);
      }
    });
  </script>
</body>
</html>
