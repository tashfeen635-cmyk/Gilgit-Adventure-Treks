<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Gilgit Adventure Treks</title>
  <link rel="icon" type="image/png" href="images/logo.png">
  <style>
    :root {
      --primary: #2D6A4F;
      --primary-light: #40916C;
      --primary-dark: #1B4332;
      --gold: #D4A03C;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #1e293b;
      --text-light: #64748b;
      --border: #e2e8f0;
      --danger: #ef4444;
      --success: #16a34a;
      --radius: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Times New Roman', Times, serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    }
    .login-card {
      background: var(--card);
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 420px;
    }
    .login-card .logo-area {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .login-card .logo-area img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      margin-bottom: 0.5rem;
    }
    .login-card h1 {
      text-align: center;
      color: var(--primary);
      margin-bottom: 0.25rem;
      font-size: 1.5rem;
    }
    .login-card .subtitle {
      text-align: center;
      color: var(--text-light);
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
    }
    .error-msg {
      background: #fef2f2;
      color: var(--danger);
      padding: 0.75rem;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      font-size: 0.875rem;
      display: none;
    }
    .success-msg {
      background: #f0fdf4;
      color: var(--success);
      padding: 0.75rem;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      font-size: 0.875rem;
      display: none;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.35rem;
      color: var(--text);
    }
    .form-control {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(45,106,79,0.1);
    }
    .code-input {
      text-align: center;
      font-size: 1.5rem;
      letter-spacing: 6px;
      font-weight: 700;
    }
    .btn-primary {
      width: 100%;
      padding: 0.7rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover {
      background: var(--primary-dark);
    }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .links {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.875rem;
      color: var(--text-light);
    }
    .links a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    .links a:hover {
      text-decoration: underline;
    }
    .hidden { display: none; }
    .step-indicator {
      text-align: center;
      margin-bottom: 1rem;
      font-size: 0.8rem;
      color: var(--text-light);
    }
    .resend-link {
      text-align: center;
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: var(--text-light);
    }
    .resend-link a {
      color: var(--primary);
      text-decoration: none;
      cursor: pointer;
    }
    .resend-link a:hover {
      text-decoration: underline;
    }
    .resend-link a.disabled {
      color: var(--text-light);
      cursor: not-allowed;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="logo-area">
        <img src="images/logo.png" alt="Gilgit Adventure Treks">
      </div>
      <h1>Reset Password</h1>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <!-- Step 1: Enter Email -->
      <div id="step1">
        <p class="subtitle">Enter your email address and we'll send you a verification code.</p>
        <form id="emailForm">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
          </div>
          <button type="submit" class="btn-primary" id="sendCodeBtn">Send Verification Code</button>
        </form>
      </div>

      <!-- Step 2: Enter Code + New Password -->
      <div id="step2" class="hidden">
        <p class="subtitle">Enter the 6-digit code sent to <strong id="sentEmail"></strong></p>
        <form id="resetForm">
          <div class="form-group">
            <label for="code">Verification Code</label>
            <input type="text" id="code" class="form-control code-input" placeholder="000000" maxlength="6" pattern="[0-9]{6}" inputmode="numeric" required>
          </div>
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" class="form-control" placeholder="At least 6 characters" minlength="6" required>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter new password" minlength="6" required>
          </div>
          <button type="submit" class="btn-primary" id="resetBtn">Reset Password</button>
        </form>
        <div class="resend-link">
          <a id="resendLink" href="#">Resend code</a>
        </div>
      </div>

      <!-- Step 3: Success -->
      <div id="step3" class="hidden">
        <p class="subtitle" style="color: var(--success); font-weight: 600; font-size: 1rem; margin-bottom: 1rem;">Password reset successful!</p>
        <p class="subtitle">You can now log in with your new password.</p>
        <a href="login.html" class="btn-primary" style="display:block;text-align:center;text-decoration:none;padding:0.7rem;">Go to Login</a>
      </div>

      <div class="links" id="backLinks">
        <p><a href="login.html">Back to Login</a></p>
      </div>
    </div>
  </div>

  <script>
    const errorEl = document.getElementById('errorMsg');
    const successEl = document.getElementById('successMsg');
    let userEmail = '';

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
      successEl.style.display = 'none';
    }

    function showSuccess(msg) {
      successEl.textContent = msg;
      successEl.style.display = 'block';
      errorEl.style.display = 'none';
    }

    function clearMessages() {
      errorEl.style.display = 'none';
      successEl.style.display = 'none';
    }

    // Step 1: Send code
    document.getElementById('emailForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessages();
      const btn = document.getElementById('sendCodeBtn');
      userEmail = document.getElementById('email').value.trim();

      if (!userEmail) return showError('Please enter your email');

      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const res = await fetch('/api/users/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: userEmail })
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.message || 'Something went wrong');
          btn.disabled = false;
          btn.textContent = 'Send Verification Code';
          return;
        }

        // Move to step 2
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        document.getElementById('sentEmail').textContent = userEmail;
        showSuccess('If that email is registered, a verification code has been sent. Check your inbox.');
        startResendCooldown();
      } catch (err) {
        showError('Network error. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Send Verification Code';
      }
    });

    // Step 2: Reset password
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessages();
      const btn = document.getElementById('resetBtn');
      const code = document.getElementById('code').value.trim();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!code || code.length !== 6) return showError('Please enter the 6-digit code');
      if (newPassword.length < 6) return showError('Password must be at least 6 characters');
      if (newPassword !== confirmPassword) return showError('Passwords do not match');

      btn.disabled = true;
      btn.textContent = 'Resetting...';

      try {
        const res = await fetch('/api/users/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: userEmail, code, newPassword })
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.message || 'Reset failed');
          btn.disabled = false;
          btn.textContent = 'Reset Password';
          return;
        }

        // Move to step 3
        clearMessages();
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
        document.getElementById('backLinks').classList.add('hidden');
      } catch (err) {
        showError('Network error. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    });

    // Resend code with cooldown
    function startResendCooldown() {
      const link = document.getElementById('resendLink');
      let seconds = 60;
      link.classList.add('disabled');
      link.textContent = `Resend code (${seconds}s)`;

      const interval = setInterval(() => {
        seconds--;
        if (seconds <= 0) {
          clearInterval(interval);
          link.classList.remove('disabled');
          link.textContent = 'Resend code';
        } else {
          link.textContent = `Resend code (${seconds}s)`;
        }
      }, 1000);
    }

    document.getElementById('resendLink').addEventListener('click', async (e) => {
      e.preventDefault();
      if (e.target.classList.contains('disabled')) return;
      clearMessages();

      try {
        const res = await fetch('/api/users/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: userEmail })
        });

        if (res.ok) {
          showSuccess('A new code has been sent to your email.');
          startResendCooldown();
        }
      } catch (err) {
        showError('Failed to resend code. Please try again.');
      }
    });

    // Only allow numeric input for code field
    document.getElementById('code').addEventListener('input', function () {
      this.value = this.value.replace(/[^0-9]/g, '');
    });

    // Dynamic branding from site settings
    fetch('/api/page-data?need=').then(r => r.json()).then(d => {
      if (d.settings && d.settings.branding) {
        var b = d.settings.branding;
        if (b.logoUrl) document.querySelector('.logo-area img').src = b.logoUrl;
        if (b.companyName) {
          document.title = 'Reset Password — ' + b.companyName;
        }
        if (b.faviconUrl) document.querySelector('link[rel="icon"]').href = b.faviconUrl;
      }
    }).catch(function(){});
  </script>
</body>
</html>
