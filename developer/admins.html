<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Accounts — Developer Panel</title>
  <link rel="stylesheet" href="css/developer.css">
</head>
<body>
  <div class="dev-topbar">
    <h1>Developer Panel</h1>
    <div class="topbar-right">
      <span class="dev-user" id="devUser"></span>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </div>

  <nav class="dev-nav">
    <a href="index.html">Dashboard</a>
    <a href="branding.html">Branding</a>
    <a href="hero.html">Hero</a>
    <a href="sections.html">Sections</a>
    <a href="navigation.html">Navigation</a>
    <a href="footer.html">Footer</a>
    <a href="newsletter.html">Newsletter</a>
    <a href="booking.html">Booking</a>
    <a href="contact.html">Contact</a>
    <a href="ai-planner.html">AI Planner</a>
    <a href="admins.html">Admins</a>
    <a href="loading.html">Loading</a>
    <a href="seo.html">SEO</a>
    <a href="settings.html">Settings</a>
  </nav>

  <div class="dev-content">
    <div class="dev-card">
      <div class="dev-card-header">
        <h2>Admin Accounts</h2>
        <button class="btn btn-primary btn-sm" onclick="openModal('createModal')">+ Create Admin</button>
      </div>
      <div class="dev-card-body">
        <div class="settings-msg" id="msg"></div>
        <div class="dev-table-wrap">
          <table class="dev-table">
            <thead>
              <tr>
                <th>Username</th>
                <th>Created</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="adminsTable">
              <tr><td colspan="3" style="text-align:center;color:#94a3b8;">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Create Admin Modal -->
  <div class="dev-modal-overlay" id="createModal">
    <div class="dev-modal">
      <div class="dev-modal-header">
        <h3>Create Admin Account</h3>
        <button class="dev-modal-close" onclick="closeModal('createModal')">&times;</button>
      </div>
      <div class="dev-modal-body">
        <div class="settings-msg" id="createMsg"></div>
        <div class="form-group">
          <label for="newUsername">Username</label>
          <input type="text" id="newUsername" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="newPassword">Password (min 6 characters)</label>
          <div class="password-wrapper">
            <input type="password" id="newPassword" class="form-control" required minlength="6">
            <button type="button" class="password-toggle" onclick="togglePassword(this)">&#128065;</button>
          </div>
        </div>
      </div>
      <div class="dev-modal-footer">
        <button class="btn btn-outline" onclick="closeModal('createModal')">Cancel</button>
        <button class="btn btn-primary" id="createAdminBtn">Create</button>
      </div>
    </div>
  </div>

  <!-- Reset Password Modal -->
  <div class="dev-modal-overlay" id="resetModal">
    <div class="dev-modal">
      <div class="dev-modal-header">
        <h3>Reset Password</h3>
        <button class="dev-modal-close" onclick="closeModal('resetModal')">&times;</button>
      </div>
      <div class="dev-modal-body">
        <div class="settings-msg" id="resetMsg"></div>
        <p style="margin-bottom:1rem;color:#64748b;font-size:0.875rem;">Resetting password for: <strong id="resetUsername"></strong></p>
        <div class="form-group">
          <label for="resetPassword">New Password (min 6 characters)</label>
          <div class="password-wrapper">
            <input type="password" id="resetPassword" class="form-control" required minlength="6">
            <button type="button" class="password-toggle" onclick="togglePassword(this)">&#128065;</button>
          </div>
        </div>
      </div>
      <div class="dev-modal-footer">
        <button class="btn btn-outline" onclick="closeModal('resetModal')">Cancel</button>
        <button class="btn btn-primary" id="resetBtn">Reset Password</button>
      </div>
    </div>
  </div>

  <script src="js/developer.js"></script>
  <script>
    initDevLayout();

    var admins = [];
    var resetTargetId = null;

    async function loadAdmins() {
      admins = await apiCall('/dev/admins');
      var tbody = document.getElementById('adminsTable');
      if (!admins || admins.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#94a3b8;">No admin accounts</td></tr>';
        return;
      }
      tbody.innerHTML = admins.map(function(a) {
        return '<tr>' +
          '<td><strong>' + escapeHtml(a.username) + '</strong></td>' +
          '<td>' + new Date(a.createdAt).toLocaleDateString() + '</td>' +
          '<td>' +
            '<button class="btn btn-outline btn-sm reset-btn" data-id="' + a._id + '" data-name="' + escapeHtml(a.username) + '">Reset Password</button> ' +
            '<button class="btn btn-danger btn-sm delete-btn" data-id="' + a._id + '" data-name="' + escapeHtml(a.username) + '">Delete</button>' +
          '</td>' +
        '</tr>';
      }).join('');

      tbody.querySelectorAll('.reset-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          resetTargetId = this.dataset.id;
          document.getElementById('resetUsername').textContent = this.dataset.name;
          document.getElementById('resetPassword').value = '';
          document.getElementById('resetMsg').style.display = 'none';
          openModal('resetModal');
        });
      });

      tbody.querySelectorAll('.delete-btn').forEach(function(btn) {
        btn.addEventListener('click', async function() {
          if (!confirm('Delete admin "' + this.dataset.name + '"? This cannot be undone.')) return;
          try {
            await apiCall('/dev/admins/' + this.dataset.id, { method: 'DELETE' });
            showMsg(document.getElementById('msg'), 'Admin deleted', false);
            loadAdmins();
          } catch (err) {
            showMsg(document.getElementById('msg'), err.message, true);
          }
        });
      });
    }

    loadAdmins();

    document.getElementById('createAdminBtn').addEventListener('click', async function() {
      var msgEl = document.getElementById('createMsg');
      var username = document.getElementById('newUsername').value.trim();
      var password = document.getElementById('newPassword').value;
      if (!username || !password) { showMsg(msgEl, 'Fill all fields', true); return; }
      if (password.length < 6) { showMsg(msgEl, 'Password must be at least 6 characters', true); return; }
      try {
        await apiCall('/dev/admins', { method: 'POST', body: JSON.stringify({ username: username, password: password }) });
        closeModal('createModal');
        document.getElementById('newUsername').value = '';
        document.getElementById('newPassword').value = '';
        showMsg(document.getElementById('msg'), 'Admin created!', false);
        loadAdmins();
      } catch (err) {
        showMsg(msgEl, err.message, true);
      }
    });

    document.getElementById('resetBtn').addEventListener('click', async function() {
      var msgEl = document.getElementById('resetMsg');
      var password = document.getElementById('resetPassword').value;
      if (!password || password.length < 6) { showMsg(msgEl, 'Password must be at least 6 characters', true); return; }
      try {
        await apiCall('/dev/admins/' + resetTargetId + '/reset-password', {
          method: 'PUT',
          body: JSON.stringify({ newPassword: password })
        });
        closeModal('resetModal');
        showMsg(document.getElementById('msg'), 'Password reset successfully!', false);
      } catch (err) {
        showMsg(msgEl, err.message, true);
      }
    });
  </script>
</body>
</html>
