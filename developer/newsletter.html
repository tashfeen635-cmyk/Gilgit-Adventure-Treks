<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newsletter — Developer Panel</title>
  <link rel="stylesheet" href="css/developer.css">
</head>
<body>
  <div class="dev-topbar">
    <h1>Developer Panel</h1>
    <div class="topbar-right">
      <span class="dev-user" id="devUser"></span>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </div>

  <nav class="dev-nav">
    <a href="index.html">Dashboard</a>
    <a href="branding.html">Branding</a>
    <a href="hero.html">Hero</a>
    <a href="sections.html">Sections</a>
    <a href="navigation.html">Navigation</a>
    <a href="footer.html">Footer</a>
    <a href="newsletter.html">Newsletter</a>
    <a href="booking.html">Booking</a>
    <a href="contact.html">Contact</a>
    <a href="ai-planner.html">AI Planner</a>
    <a href="admins.html">Admins</a>
    <a href="loading.html">Loading</a>
    <a href="settings.html">Settings</a>
  </nav>

  <div class="dev-content">
    <div class="dev-card">
      <div class="dev-card-header"><h2>Newsletter Section Text</h2></div>
      <div class="dev-card-body">
        <div class="settings-msg" id="msg"></div>
        <form id="newsletterForm">
          <div class="form-group">
            <label for="heading">Heading</label>
            <input type="text" id="heading" class="form-control">
          </div>
          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" class="form-control" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label for="subscriberNote">Subscriber Note (below form)</label>
            <input type="text" id="subscriberNote" class="form-control">
          </div>
          <button type="submit" class="btn btn-primary">Save Newsletter Settings</button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/developer.js"></script>
  <script>
    initDevLayout();

    (async () => {
      var s = await loadSettings();
      var n = s.newsletter || {};
      document.getElementById('heading').value = n.heading || '';
      document.getElementById('description').value = n.description || '';
      document.getElementById('subscriberNote').value = n.subscriberNote || '';
    })();

    document.getElementById('newsletterForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var msgEl = document.getElementById('msg');
      try {
        await saveSettings({
          newsletter: {
            heading: document.getElementById('heading').value.trim(),
            description: document.getElementById('description').value.trim(),
            subscriberNote: document.getElementById('subscriberNote').value.trim()
          }
        });
        showMsg(msgEl, 'Newsletter settings saved!', false);
      } catch (err) {
        showMsg(msgEl, err.message, true);
      }
    });
  </script>
</body>
</html>
